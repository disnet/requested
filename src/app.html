<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<meta name="theme-color" content="#faf7f0" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#1d1c26" media="(prefers-color-scheme: dark)" />
		<script>
			// Pre-paint theme bootstrap — avoids a flash of light theme on load
			// for users with a dark preference or stored 'dark' selection.
			(function () {
				try {
					var pref = localStorage.getItem('requested:theme');
					if (pref === 'light' || pref === 'dark') {
						document.documentElement.setAttribute('data-theme', pref);
					}
				} catch (_) {
					// localStorage may be unavailable (privacy mode); fall back to CSS.
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
